<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1247"/>
      <stop offset="100%" stop-color="#04050b"/>
    </radialGradient>
    <radialGradient id="moon" cx="65%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff5d6"/>
      <stop offset="60%" stop-color="#e2cf94"/>
      <stop offset="100%" stop-color="#a98a44"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="90"  cy="120" r="2.2"/>
    <circle cx="160" cy="80"  r="1.6"/>
    <circle cx="220" cy="150" r="1.2"/>
    <circle cx="380" cy="110" r="2"/>
    <circle cx="430" cy="200" r="1.4"/>
    <circle cx="100" cy="380" r="1.6"/>
    <circle cx="190" cy="430" r="1.8"/>
    <circle cx="350" cy="400" r="1.4"/>
    <circle cx="420" cy="360" r="1.2"/>
  </g>
  <!-- moon glow -->
  <circle cx="256" cy="260" r="120" fill="#fff5d6" opacity="0.12" filter="url(#glow)"/>
  <!-- crescent moon: full circle minus offset circle -->
  <g>
    <circle cx="256" cy="260" r="110" fill="url(#moon)"/>
    <circle cx="296" cy="240" r="100" fill="#04050b"/>
  </g>
</svg>
